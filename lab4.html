<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Great Auto Parts - Order Form</title>

    <style>
    /* Page Background */
    body {
        background-color: #f4f4f4;
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        padding: 0;
    }

    /* Main Container */
    .container {
        width: 600px;
        margin: 40px auto;
        background-color: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    /* Title */
    h1 {
        text-align: center;
        margin-bottom: 25px;
    }

    /* Labels */
    label {
        display: block;
        margin-top: 15px;
        margin-bottom: 5px;
        font-weight: bold;
    }

    /* Inputs */
    input, textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 14px;
        box-sizing: border-box;
    }

    /* Textarea */
    textarea {
        height: 120px;
        resize: vertical;
    }

    /* Button */
    button {
        width: 100%;
        margin-top: 20px;
        padding: 12px;
        background-color: black;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
    }

    /* Button Hover */
    button:hover {
        background-color: #333;
    }
    </style>

</head>
<body>

    <div class="container">
        <h1>Great Auto Parts - Order Form</h1>

        <form>

            <label>First Name:</label>
            <input type="text" placeholder="Enter your first name">

            <label>Last Name:</label>
            <input type="text" placeholder="Enter your last name">

            <label>Email:</label>
            <input type="email" placeholder="Enter your email address">

            <label>Phone number:</label>
            <input type="tel" placeholder="Enter your phone number">

            <label>Make:</label>
            <input type="text" placeholder="Make">

            <label>Model:</label>
            <input type="text" placeholder="Model">

            <label>Year:</label>
            <input type="number" placeholder="Year">

            <label>Date:</label>
            <input type="date">

            <label>Spare Part:</label>
            <input type="text" placeholder="Enter the spare part you need">

            <label>Quantity:</label>
            <input type="number" placeholder="Enter the quantity of the spare part you need">

            <label>Comment:</label>
            <textarea placeholder="Enter your comment"></textarea>

            <button type="submit">Submit</button>

        </form>
    </div>

</body>
</html>
